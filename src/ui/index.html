<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTA Strategic Roadmap Visualizer</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    /* ── Design tokens ───────────────────────────────────────────────────── */
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --turning: #7c3aed;
      --positive: #059669;
      --negative: #dc2626;
      --warn: #d97706;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
    }

    header .tagline {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .selector-group {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .selector-group label {
      font-size: 0.75rem;
      color: var(--muted);
    }

    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      max-width: 340px;
    }

    /* ── Main split ──────────────────────────────────────────────────────── */
    .main-split {
      display: grid;
      grid-template-columns: 1fr 300px;
      flex: 1 0 0;
      min-height: 0;
      border-bottom: 1px solid var(--border);
    }

    /* ── Flowchart pane ──────────────────────────────────────────────────── */
    .flowchart-pane {
      padding: 1.25rem 1.5rem;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .pane-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .legend {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    #diagram-container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 200px;
    }

    #diagram-container svg {
      max-width: 100%;
      height: auto;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 0.875rem;
      text-align: center;
      line-height: 1.8;
    }

    .loading code {
      background: var(--surface2);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-size: 0.8rem;
    }

    /* ── Detail panel ────────────────────────────────────────────────────── */
    .detail-pane {
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 1.25rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .detail-empty {
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
      padding: 2rem 0.5rem;
      line-height: 1.8;
    }

    .detail-card {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .year-badge {
      display: inline-block;
      background: var(--turning);
      color: #e9d5ff;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 99px;
      width: fit-content;
    }

    .detail-card h3 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--accent);
    }

    .detail-card p {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .driver-tag {
      display: inline-block;
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(59, 130, 246, 0.25);
      color: var(--accent);
      font-size: 0.68rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      width: fit-content;
    }

    .branches-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
    }

    .branch-item {
      background: var(--bg);
      border-radius: 6px;
      padding: 0.6rem 0.75rem;
      border-left: 3px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .branch-item.pos {
      border-left-color: var(--positive);
    }

    .branch-item.neg {
      border-left-color: var(--negative);
    }

    .branch-item.neu {
      border-left-color: var(--warn);
    }

    .branch-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .branch-label {
      font-size: 0.8rem;
      font-weight: 600;
    }

    .prob-pill {
      font-size: 0.68rem;
      background: var(--surface2);
      color: var(--muted);
      padding: 0.1rem 0.4rem;
      border-radius: 99px;
    }

    .branch-desc {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .delta-row {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
      margin-top: 0.1rem;
    }

    .delta-chip {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
    }

    .delta-chip.pos {
      background: rgba(5, 150, 105, 0.18);
      color: #34d399;
    }

    .delta-chip.neg {
      background: rgba(220, 38, 38, 0.18);
      color: #f87171;
    }

    .delta-chip.zer {
      background: rgba(148, 163, 184, 0.1);
      color: var(--muted);
    }

    /* ── Timeline chart ──────────────────────────────────────────────────── */
    .chart-section {
      padding: 1rem 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .chart-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .metric-toggles {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .metric-btn {
      padding: 0.25rem 0.65rem;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.12s;
    }

    .metric-btn.on {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .chart-wrap {
      height: 200px;
      position: relative;
    }

    /* ── Tooltip overlay ─────────────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      max-width: 240px;
      z-index: 1000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5);
    }

    #tooltip.show {
      opacity: 1;
    }

    #tooltip h4 {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }

    #tooltip p {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.4;
    }
  </style>
</head>

<body>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header>
    <div>
      <h1>OTA Strategic Roadmap Visualizer</h1>
      <div class="tagline">AI Disruption · NDC · GenAI · 1990 – 2040</div>
    </div>
    <div class="selector-group">
      <label for="scen-sel">Timeline:</label>
      <select id="scen-sel" onchange="onScenarioChange()"></select>
    </div>
  </header>

  <!-- ── Main split ─────────────────────────────────────────────────────── -->
  <div class="main-split">

    <!-- Flowchart -->
    <div class="flowchart-pane">
      <div class="pane-title">Strategic Decision Tree</div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:#7c3aed"></div>Turning Point
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#059669"></div>Positive Outcome
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#dc2626"></div>Negative Outcome
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#334155"></div>Historical
        </div>
      </div>
      <div id="diagram-container">
        <div class="loading">Rendering decision tree…</div>
      </div>
    </div>

    <!-- Detail panel -->
    <div class="detail-pane">
      <div class="pane-title">Turning Point Details</div>
      <div id="detail-content">
        <div class="detail-empty">
          Hover a node to preview details.<br>
          Click to pin the selection.
        </div>
      </div>
    </div>
  </div>

  <!-- ── Metrics Timeline ───────────────────────────────────────────────── -->
  <div class="chart-section">
    <div class="chart-header">
      <div class="pane-title" style="margin:0">Metrics Timeline</div>
      <div class="metric-toggles">
        <button class="metric-btn on" data-m="revenue" onclick="toggleMetric(this)">Revenue Index</button>
        <button class="metric-btn on" data-m="market_share" onclick="toggleMetric(this)">Market Share</button>
        <button class="metric-btn on" data-m="tech" onclick="toggleMetric(this)">Tech Adoption</button>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="timeline-chart"></canvas>
    </div>
  </div>

  <!-- ── Tooltip overlay ────────────────────────────────────────────────── -->
  <div id="tooltip">
    <h4 id="tt-title"></h4>
    <p id="tt-body"></p>
  </div>

  <!-- ── Scripts ────────────────────────────────────────────────────────── -->
  <script>
    // ── Embedded fallback (mirrors data/scenarios.json) ──────────────────────
    // Update by re-running src/engine/simulator.py → saves data/scenarios.json
    const FALLBACK = [{ "id": "scenario-001", "name": "AI Leapfrog", "description": "A scenario where aggressive AI adoption reshapes the OTA landscape, rewarding early movers with proprietary AI capabilities while commoditizing traditional search-and-book intermediaries.", "timeline": [{ "year": 1990, "metrics": { "revenue_index": 1.0, "market_share": 0.02, "tech_adoption_velocity": 0.05 }, "label": "OTA industry emerges" }, { "year": 1995, "metrics": { "revenue_index": 1.8, "market_share": 0.05, "tech_adoption_velocity": 0.1 }, "label": null }, { "year": 2000, "metrics": { "revenue_index": 4.0, "market_share": 0.15, "tech_adoption_velocity": 0.2 }, "label": "Dot-com boom & OTA expansion" }, { "year": 2005, "metrics": { "revenue_index": 6.5, "market_share": 0.25, "tech_adoption_velocity": 0.3 }, "label": null }, { "year": 2008, "metrics": { "revenue_index": 5.8, "market_share": 0.28, "tech_adoption_velocity": 0.35 }, "label": "Financial crisis impact" }, { "year": 2010, "metrics": { "revenue_index": 7.0, "market_share": 0.3, "tech_adoption_velocity": 0.4 }, "label": "Mobile booking begins" }, { "year": 2015, "metrics": { "revenue_index": 10.0, "market_share": 0.35, "tech_adoption_velocity": 0.5 }, "label": "Meta-search dominance" }, { "year": 2019, "metrics": { "revenue_index": 13.0, "market_share": 0.38, "tech_adoption_velocity": 0.55 }, "label": "Pre-pandemic peak" }, { "year": 2020, "metrics": { "revenue_index": 4.5, "market_share": 0.3, "tech_adoption_velocity": 0.58 }, "label": "COVID-19 collapse" }, { "year": 2023, "metrics": { "revenue_index": 11.0, "market_share": 0.33, "tech_adoption_velocity": 0.65 }, "label": "Recovery & GenAI emergence" }, { "year": 2025, "metrics": { "revenue_index": 14.0, "market_share": 0.35, "tech_adoption_velocity": 0.75 }, "label": "NDC adoption accelerates" }, { "year": 2028, "metrics": { "revenue_index": 18.0, "market_share": 0.38, "tech_adoption_velocity": 0.85 }, "label": null }, { "year": 2030, "metrics": { "revenue_index": 22.0, "market_share": 0.4, "tech_adoption_velocity": 0.9 }, "label": "AI agents reshape booking" }, { "year": 2035, "metrics": { "revenue_index": 30.0, "market_share": 0.42, "tech_adoption_velocity": 0.95 }, "label": null }, { "year": 2040, "metrics": { "revenue_index": 40.0, "market_share": 0.45, "tech_adoption_velocity": 0.98 }, "label": "Autonomous travel planning" }], "nodes": [{ "id": "tp-001", "year": 2025, "title": "NDC Standard Adoption", "description": "Airlines push direct distribution via NDC, threatening OTA intermediation.", "external_driver": "NDC adoption", "branches": [{ "id": "tp-001-a", "label": "Embrace NDC", "description": "Integrate NDC pipelines and offer rich airline content.", "metric_delta": { "revenue_index": 0.05, "market_share": 0.02, "tech_adoption_velocity": 0.1 }, "probability": 0.6, "next_node_id": "tp-002" }, { "id": "tp-001-b", "label": "Resist NDC", "description": "Maintain legacy GDS relationships; risk content gaps.", "metric_delta": { "revenue_index": -0.03, "market_share": -0.04, "tech_adoption_velocity": 0.02 }, "probability": 0.4, "next_node_id": "tp-002" }] }, { "id": "tp-002", "year": 2028, "title": "AI Agent Gateway Decision", "description": "Decide whether to build proprietary AI travel agents or partner with platform providers.", "external_driver": "GenAI breakthrough", "branches": [{ "id": "tp-002-a", "label": "Build Proprietary AI", "description": "Heavy R&D investment in in-house AI concierge capabilities.", "metric_delta": { "revenue_index": 0.12, "market_share": 0.06, "tech_adoption_velocity": 0.15 }, "probability": 0.35, "next_node_id": "tp-003" }, { "id": "tp-002-b", "label": "Partner with AI Platforms", "description": "Integrate with major AI assistants as a travel fulfillment backend.", "metric_delta": { "revenue_index": 0.08, "market_share": 0.03, "tech_adoption_velocity": 0.12 }, "probability": 0.45, "next_node_id": "tp-003" }, { "id": "tp-002-c", "label": "Wait and See", "description": "Minimal AI investment; focus on existing search/book model.", "metric_delta": { "revenue_index": -0.02, "market_share": -0.05, "tech_adoption_velocity": 0.03 }, "probability": 0.2, "next_node_id": "tp-003" }] }, { "id": "tp-003", "year": 2032, "title": "Airline Direct Booking Dominance Tipping Point", "description": "Airlines capture >50% of bookings direct; OTAs must redefine value proposition.", "external_driver": "Airline direct booking dominance", "branches": [{ "id": "tp-003-a", "label": "Pivot to Complex Itineraries", "description": "Focus on multi-city, multi-modal trips that airlines cannot serve directly.", "metric_delta": { "revenue_index": 0.1, "market_share": -0.02, "tech_adoption_velocity": 0.08 }, "probability": 0.5, "next_node_id": null }, { "id": "tp-003-b", "label": "Become Aggregator Platform", "description": "Transform into marketplace connecting travelers with suppliers via AI.", "metric_delta": { "revenue_index": 0.15, "market_share": 0.05, "tech_adoption_velocity": 0.12 }, "probability": 0.3, "next_node_id": null }, { "id": "tp-003-c", "label": "Consolidate or Exit", "description": "Merge with competitors or exit market due to margin compression.", "metric_delta": { "revenue_index": -0.2, "market_share": -0.15, "tech_adoption_velocity": 0.0 }, "probability": 0.2, "next_node_id": null }] }], "strategic_profiles": [{ "name": "Cost Leader", "description": "Optimizes operations for price-sensitive segments via scale and automation.", "ai_adoption_bias": 0.4, "direct_booking_resilience": 0.3, "strategic_stance": "Efficiency-led" }, { "name": "Differentiator", "description": "Invests heavily in AI-driven personalization and premium experiences.", "ai_adoption_bias": 0.9, "direct_booking_resilience": 0.7, "strategic_stance": "Innovation-led" }, { "name": "Niche Search", "description": "Focuses on underserved routes and complex itineraries using proprietary technology.", "ai_adoption_bias": 0.7, "direct_booking_resilience": 0.5, "strategic_stance": "Innovation-led" }], "competitors": [{ "name": "Kiwi.com", "key_capability": "Virtual Interlining", "initial_position": { "airline_direct_booking_dominance": 0.3, "ai_agent_adoption": 0.6, "strategic_orientation": "Innovation-led" }, "default_profile": "Niche Search" }, { "name": "eDreams ODIGEO", "key_capability": "Prime Subscription", "initial_position": { "airline_direct_booking_dominance": 0.5, "ai_agent_adoption": 0.5, "strategic_orientation": "Efficiency-led" }, "default_profile": "Cost Leader" }], "metadata": { "author": "Strategic Roadmap Engine", "version": "1.0", "base_year": "2025", "frameworks": "PESTEL, Porter's Five Forces, 2x2+S Matrix" } }];

    // ── State ─────────────────────────────────────────────────────────────────
    let scenarios = [];
    let baseScenario = null;
    let activeScenIdx = 0;
    let pinnedId = null;  // mermaid node id pinned by click
    let chart = null;
    const activeMetrics = new Set(['revenue', 'market_share', 'tech']);

    // Maps mermaid-svg node id → { type, data }
    const nodeMap = {};

    // ── Boot ──────────────────────────────────────────────────────────────────
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        darkMode: true,
        background: '#0f172a',
        primaryColor: '#1e3a5f',
        primaryTextColor: '#f1f5f9',
        primaryBorderColor: '#4a9eff',
        lineColor: '#475569',
        secondaryColor: '#334155',
        tertiaryColor: '#1e293b',
        edgeLabelBackground: '#1e293b',
        fontFamily: 'Segoe UI, system-ui, sans-serif',
        fontSize: '13px',
      },
      flowchart: { curve: 'basis', htmlLabels: true, padding: 20 },
      securityLevel: 'loose',
    });

    async function init() {
      try {
        // Works when served via HTTP; fails on file:// (CORS)
        const res = await fetch('../../data/scenarios.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        scenarios = await res.json();
      } catch {
        scenarios = FALLBACK;
      }

      baseScenario = scenarios.find(s => s.id === 'scenario-001') || scenarios[0];
      buildSelector();
      await renderFlowchart(baseScenario);
      renderChart();
    }

    // ── Scenario selector ─────────────────────────────────────────────────────
    function buildSelector() {
      const sel = document.getElementById('scen-sel');
      scenarios.forEach((s, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = s.name.length > 55 ? s.name.slice(0, 52) + '…' : s.name;
        sel.appendChild(opt);
      });
    }

    function onScenarioChange() {
      activeScenIdx = parseInt(document.getElementById('scen-sel').value, 10);
      renderChart();
    }

    // ── Mermaid diagram ───────────────────────────────────────────────────────
    function buildDef(scenario) {
      // Clear the lookup map
      Object.keys(nodeMap).forEach(k => delete nodeMap[k]);

      const lines = ['flowchart LR'];
      lines.push('    classDef hist  fill:#1e293b,stroke:#334155,color:#94a3b8');
      lines.push('    classDef tp    fill:#3b0764,stroke:#7c3aed,color:#e9d5ff,font-weight:bold');
      lines.push('    classDef endP  fill:#052e16,stroke:#059669,color:#86efac');
      lines.push('    classDef endN  fill:#450a0a,stroke:#dc2626,color:#fca5a5');

      const sorted = [...scenario.nodes].sort((a, b) => a.year - b.year);
      const firstYear = sorted[0]?.year ?? 9999;

      // Historical chain (labeled milestones before first turning point)
      const milestones = scenario.timeline
        .filter(t => t.label && t.year < firstYear)
        .sort((a, b) => a.year - b.year);

      let prevId = null;
      milestones.forEach(m => {
        const id = `HIST_${m.year}`;
        lines.push(`    ${id}(["${m.year}<br/>${m.label}"])`);
        lines.push(`    class ${id} hist`);
        if (prevId) lines.push(`    ${prevId} --> ${id}`);
        prevId = id;
        nodeMap[id] = { type: 'milestone', data: m };
      });

      // Turning points and their branches
      sorted.forEach((node, ni) => {
        const tpId = `TP_${node.id.replace(/-/g, '_')}`;
        lines.push(`    ${tpId}{{"${node.year}<br/> ${escMd(node.title)}"}}`);
        lines.push(`    class ${tpId} tp`);
        nodeMap[tpId] = { type: 'turning_point', data: node };

        // Connect from previous (historical chain or previous TP already handled via branch edges)
        if (ni === 0 && prevId) lines.push(`    ${prevId} --> ${tpId}`);

        node.branches.forEach(branch => {
          const pct = Math.round(branch.probability * 100);
          const edge = `"${escMd(branch.label)} · ${pct}%"`;

          if (branch.next_node_id) {
            const nextNode = sorted.find(n => n.id === branch.next_node_id);
            if (nextNode) {
              const nextId = `TP_${nextNode.id.replace(/-/g, '_')}`;
              lines.push(`    ${tpId} -->|${edge}| ${nextId}`);
            }
          } else {
            // Terminal outcome node
            const endId = `END_${branch.id.replace(/-/g, '_')}`;
            const endClass = branch.metric_delta.revenue_index >= 0 ? 'endP' : 'endN';
            lines.push(`    ${endId}(["2040<br/>${escMd(branch.label)}"])`);
            lines.push(`    class ${endId} ${endClass}`);
            lines.push(`    ${tpId} -->|${edge}| ${endId}`);
            nodeMap[endId] = { type: 'outcome', data: branch };
          }
        });
      });

      return lines.join('\n');
    }

    function escMd(str) {
      // Escape characters that break Mermaid label parsing
      return str.replace(/"/g, '&quot;').replace(/[<>]/g, '');
    }

    async function renderFlowchart(scenario) {
      const container = document.getElementById('diagram-container');
      container.innerHTML = '<div class="loading">Rendering decision tree…</div>';

      try {
        const def = buildDef(scenario);
        const { svg } = await mermaid.render('ota-roadmap', def);
        container.innerHTML = svg;
        attachSvgHandlers();
      } catch (err) {
        console.error('Mermaid render error:', err);
        container.innerHTML = `
        <div class="loading" style="color:#f87171">
          Diagram render error.<br><small>${err.message}</small><br><br>
          To load live data, serve the project via:<br>
          <code>python -m http.server 8080</code><br>
          Then open <code>http://localhost:8080/src/ui/index.html</code>
        </div>`;
      }
    }

    // ── SVG interaction ───────────────────────────────────────────────────────
    const tooltip = document.getElementById('tooltip');

    function attachSvgHandlers() {
      const svg = document.querySelector('#diagram-container svg');
      if (!svg) return;

      svg.querySelectorAll('g.node').forEach(el => {
        // Mermaid 10 sets id="flowchart-NODEID-N"
        const raw = el.id || '';
        const nodeId = raw.replace(/^flowchart-/, '').replace(/-\d+$/, '');
        const info = nodeMap[nodeId];
        if (!info) return;

        el.style.cursor = 'pointer';

        el.addEventListener('mouseenter', e => {
          showTooltip(e, info);
          if (!pinnedId) showDetail(info, nodeId);
        });
        el.addEventListener('mousemove', positionTooltip);
        el.addEventListener('mouseleave', () => {
          hideTooltip();
          if (!pinnedId) clearDetail();
        });
        el.addEventListener('click', () => {
          if (pinnedId === nodeId) {
            pinnedId = null;
            clearDetail();
          } else {
            pinnedId = nodeId;
            showDetail(info, nodeId);
          }
        });
      });
    }

    function showTooltip(e, info) {
      document.getElementById('tt-title').textContent = nodeTitle(info);
      document.getElementById('tt-body').textContent = nodeBlurb(info);
      tooltip.classList.add('show');
      positionTooltip(e);
    }

    function positionTooltip(e) {
      const x = Math.min(e.clientX + 14, window.innerWidth - 260);
      const y = Math.min(e.clientY + 14, window.innerHeight - 160);
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    }

    function hideTooltip() {
      tooltip.classList.remove('show');
    }

    function nodeTitle(info) {
      if (info.type === 'turning_point') return info.data.title;
      if (info.type === 'milestone') return `${info.data.year}: ${info.data.label}`;
      return info.data.label;
    }

    function nodeBlurb(info) {
      if (info.type === 'turning_point') return `Driver: ${info.data.external_driver} — ${info.data.description}`;
      if (info.type === 'milestone') return `Rev ${info.data.metrics.revenue_index}× · Share ${(info.data.metrics.market_share * 100).toFixed(0)}% · TechAdp ${(info.data.metrics.tech_adoption_velocity * 100).toFixed(0)}%`;
      return info.data.description;
    }

    // ── Detail panel ──────────────────────────────────────────────────────────
    function showDetail(info, _nodeId) {
      const el = document.getElementById('detail-content');

      if (info.type === 'turning_point') {
        const node = info.data;
        el.innerHTML = `
        <div class="detail-card">
          <div class="year-badge">${node.year}</div>
          <h3>${node.title}</h3>
          <p>${node.description}</p>
          <div class="driver-tag">Driver: ${node.external_driver}</div>
          <div class="branches-label">Branches</div>
          ${node.branches.map(b => {
          const d = b.metric_delta.revenue_index;
          const bc = d > 0 ? 'pos' : d < 0 ? 'neg' : 'neu';
          return `
            <div class="branch-item ${bc}">
              <div class="branch-header">
                <span class="branch-label">${b.label}</span>
                <span class="prob-pill">${Math.round(b.probability * 100)}%</span>
              </div>
              <div class="branch-desc">${b.description}</div>
              <div class="delta-row">
                ${deltaChip('Rev', b.metric_delta.revenue_index, '×')}
                ${deltaChip('Mkt%', b.metric_delta.market_share * 100, 'pp')}
                ${deltaChip('Tech%', b.metric_delta.tech_adoption_velocity * 100, 'pp')}
              </div>
            </div>`;
        }).join('')}
        </div>`;

      } else if (info.type === 'milestone') {
        const m = info.data;
        el.innerHTML = `
        <div class="detail-card">
          <div class="year-badge">${m.year}</div>
          <h3>${m.label}</h3>
          <p>
            Revenue: ${m.metrics.revenue_index}× baseline<br>
            Market share: ${(m.metrics.market_share * 100).toFixed(0)}%<br>
            Tech adoption: ${(m.metrics.tech_adoption_velocity * 100).toFixed(0)}%
          </p>
        </div>`;

      } else if (info.type === 'outcome') {
        const b = info.data;
        const d = b.metric_delta.revenue_index;
        el.innerHTML = `
        <div class="detail-card">
          <div class="year-badge">2040</div>
          <h3>${b.label}</h3>
          <p>${b.description}</p>
          <div class="delta-row" style="margin-top:0.25rem">
            ${deltaChip('Rev', d, '×')}
            ${deltaChip('Mkt%', b.metric_delta.market_share * 100, 'pp')}
            ${deltaChip('Tech%', b.metric_delta.tech_adoption_velocity * 100, 'pp')}
          </div>
        </div>`;
      }
    }

    function clearDetail() {
      document.getElementById('detail-content').innerHTML = `
      <div class="detail-empty">
        Hover a node to preview details.<br>
        Click to pin the selection.
      </div>`;
    }

    function deltaChip(label, value, unit) {
      const sign = value >= 0 ? '+' : '';
      const cls = value > 0 ? 'pos' : value < 0 ? 'neg' : 'zer';
      const disp = Math.abs(value) < 0.005 ? '0' : `${sign}${value.toFixed(1)}`;
      return `<span class="delta-chip ${cls}">${label}: ${disp}${unit}</span>`;
    }

    // ── Chart.js ──────────────────────────────────────────────────────────────
    const COLORS = {
      revenue: { line: '#3b82f6', fill: 'rgba(59,130,246,0.12)' },
      market_share: { line: '#22c55e', fill: 'rgba(34,197,94,0.10)' },
      tech: { line: '#a855f7', fill: 'rgba(168,85,247,0.10)' },
    };

    // Vertical-line plugin marks turning-point years on the chart
    const turningLinePlugin = {
      id: 'turningLines',
      afterDraw(c) {
        if (!baseScenario) return;
        const ctx = c.ctx;
        baseScenario.nodes.forEach(node => {
          const i = c.data.labels.indexOf(node.year);
          if (i === -1) return;
          const x = c.scales.x.getPixelForValue(i);
          ctx.save();
          ctx.beginPath();
          ctx.moveTo(x, c.chartArea.top);
          ctx.lineTo(x, c.chartArea.bottom);
          ctx.lineWidth = 1;
          ctx.strokeStyle = 'rgba(124,58,237,0.35)';
          ctx.setLineDash([4, 4]);
          ctx.stroke();
          ctx.restore();
        });
      },
    };
    Chart.register(turningLinePlugin);

    function renderChart() {
      const scen = scenarios[activeScenIdx] || baseScenario;
      const labels = scen.timeline.map(t => t.year);
      const datasets = [];

      if (activeMetrics.has('revenue')) {
        datasets.push({
          label: 'Revenue Index (×)',
          data: scen.timeline.map(t => t.metrics.revenue_index),
          borderColor: COLORS.revenue.line,
          backgroundColor: COLORS.revenue.fill,
          fill: true, tension: 0.4,
          pointRadius: scen.timeline.map(t => t.label ? 5 : 2),
          pointHoverRadius: 7,
          yAxisID: 'yL',
        });
      }
      if (activeMetrics.has('market_share')) {
        datasets.push({
          label: 'Market Share (%)',
          data: scen.timeline.map(t => +(t.metrics.market_share * 100).toFixed(1)),
          borderColor: COLORS.market_share.line,
          backgroundColor: COLORS.market_share.fill,
          fill: true, tension: 0.4,
          pointRadius: scen.timeline.map(t => t.label ? 5 : 2),
          pointHoverRadius: 7,
          yAxisID: 'yR',
        });
      }
      if (activeMetrics.has('tech')) {
        datasets.push({
          label: 'Tech Adoption (%)',
          data: scen.timeline.map(t => +(t.metrics.tech_adoption_velocity * 100).toFixed(1)),
          borderColor: COLORS.tech.line,
          backgroundColor: COLORS.tech.fill,
          fill: true, tension: 0.4,
          pointRadius: scen.timeline.map(t => t.label ? 5 : 2),
          pointHoverRadius: 7,
          yAxisID: 'yR',
        });
      }

      const ctx = document.getElementById('timeline-chart').getContext('2d');
      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              labels: { color: '#94a3b8', font: { size: 11 }, padding: 14 },
            },
            tooltip: {
              backgroundColor: '#1e293b',
              borderColor: '#475569',
              borderWidth: 1,
              titleColor: '#f1f5f9',
              bodyColor: '#94a3b8',
              callbacks: {
                title: items => {
                  const dp = scen.timeline[items[0].dataIndex];
                  return dp.label ? `${dp.year}  —  ${dp.label}` : String(dp.year);
                },
              },
            },
          },
          scales: {
            x: {
              grid: { color: '#1e293b' },
              ticks: { color: '#64748b', font: { size: 10 } },
            },
            yL: {
              position: 'left',
              grid: { color: '#1e293b' },
              ticks: { color: '#64748b', font: { size: 10 } },
              title: { display: true, text: 'Revenue Index (×)', color: '#64748b', font: { size: 10 } },
            },
            yR: {
              position: 'right',
              grid: { drawOnChartArea: false },
              ticks: { color: '#64748b', font: { size: 10 }, callback: v => v + '%' },
              title: { display: true, text: '%', color: '#64748b', font: { size: 10 } },
            },
          },
        },
      });
    }

    function toggleMetric(btn) {
      const m = btn.dataset.m;
      if (activeMetrics.has(m)) {
        if (activeMetrics.size > 1) { activeMetrics.delete(m); btn.classList.remove('on'); }
      } else {
        activeMetrics.add(m); btn.classList.add('on');
      }
      renderChart();
    }

    // ── Start ─────────────────────────────────────────────────────────────────
    init();
  </script>
</body>

</html>
